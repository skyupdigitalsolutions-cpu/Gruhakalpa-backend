# Raise nginx's request body limit so large POSTs (receipt / certificate PDFs
# sent as base64, ~1.3 MB) reach the Node app instead of being rejected with
# HTTP 413 "client intended to send too large body".
#
# Elastic Beanstalk (Amazon Linux 2023 / nginx proxy) automatically loads any
# .conf file under .platform/nginx/conf.d/ on deploy. Express already allows
# 50mb; this makes nginx match so it stops blocking the request first.
client_max_body_size 50M;
